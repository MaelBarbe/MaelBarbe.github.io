<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mes projets</title>
    <link rel="stylesheet" href="../../main.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-[#F9FAFB] text-zinc-800 flex flex-col min-h-screen selection:bg-zinc-200">
    <header id="header"></header>
    <main class="flex-1 flex flex-col items-center px-6 py-20 w-full max-w-6xl mx-auto gap-16">
        <h1 class="text-5xl md:text-7xl font-light tracking-tight text-zinc-900 text-center">Projets</h1>

        <div id="projects_container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-10 w-full">

            <a href="/pages/project/unbrix.html"
                class="group block w-full rounded-3xl bg-white border border-zinc-200 shadow-sm hover:shadow-lg transition-all duration-300 overflow-hidden cursor-pointer flex flex-col">
                <div class="w-full aspect-video overflow-hidden">
                    <img src="../../assets/img/unbrix.png" alt="Projet 2"
                        class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                </div>
                <div class="p-8 flex flex-col gap-3">
                    <h3
                        class="text-xl font-medium tracking-tight text-zinc-900 group-hover:text-zinc-600 transition-colors">
                        Design & Intégration</h3>
                    <p class="text-zinc-500 font-light text-sm line-clamp-2">Wireframe, prototypage et intégration d'un
                        site web pour un photographe freelance.</p>
                </div>
            </a>

            <a href="/pages/project/rename_img.html"
                class="group block w-full rounded-3xl bg-white border border-zinc-200 shadow-sm hover:shadow-lg transition-all duration-300 overflow-hidden cursor-pointer flex flex-col">
                <div class="w-full aspect-video overflow-hidden">
                    <img src="../../assets/img/rename_img.webp" alt="Projet 1"
                        class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                </div>
                <div class="p-8 flex flex-col gap-3">
                    <h3
                        class="text-xl font-medium tracking-tight text-zinc-900 group-hover:text-zinc-600 transition-colors">
                        Script Python - Renommage d'images</h3>
                    <p class="text-zinc-500 font-light text-sm line-clamp-2">Automatisation de renommage en masse pour
                        l'homogénéisation d'un répertoire photographique.</p>
                </div>
            </a>

        </div>
    </main>
    <footer id="footer" class="mt-auto"></footer>

    <script src="/script.js"></script>
    <script src="/components/header/header.js"></script>
    <script src="/components/footer/footer.js"></script>
</body>

</html>
