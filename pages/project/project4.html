<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projet 1</title>
    <link rel="stylesheet" href="../../main.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>


<body class="bg-[#F9FAFB] text-zinc-800 flex flex-col min-h-screen selection:bg-zinc-200">
    <header id="header"></header>
    <main class="flex-1 flex flex-col px-6 py-20 w-full max-w-5xl mx-auto">
        <div
            class="w-full bg-white/80 backdrop-blur-md rounded-3xl shadow-sm p-8 md:p-12 flex flex-col gap-10 md:gap-14 text-zinc-800 border border-zinc-200">
            <div class="flex justify-center w-full">
                <img src="https://placehold.co/800x400" alt="Image du projet 4"
                    class="w-full max-w-3xl rounded-2xl shadow-sm object-cover aspect-video">
            </div>
            <div class="flex flex-col gap-8 max-w-3xl mx-auto w-full">
                <h1 class="text-4xl md:text-5xl font-light tracking-tight text-zinc-900 text-center">
                    Bientôt disponible (Projet 4)
                </h1>
                <div class="text-lg md:text-xl font-light leading-relaxed text-zinc-600 text-justify">
                    <p>
                        Détails à venir...
                    </p>
                </div>
                <div class="flex justify-center pt-6">
                    <a href="#"
                        class="inline-flex items-center gap-2 px-8 py-4 bg-zinc-900 hover:bg-zinc-800 text-white rounded-full font-medium shadow-sm transition-all duration-300 hover:shadow-md hover:-translate-y-0.5">
                        Voir le projet
                    </a>
                </div>
            </div>
        </div>
    </main>
    <footer id="footer" class="mt-auto"></footer>

    <script src="/script.js"></script>
    <script src="/components/header/header.js"></script>
    <script src="/components/footer/footer.js"></script>
</body>

</html>
